<div id="lms-tugas-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-2xl">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 id="lms-tugas-modal-title" class="text-2xl font-bold text-main">Buat Tugas Baru</h3>
            <button type="button" class="btn-cancel-lms-tugas text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
        </div>
        <form id="lms-tugas-form" class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
            <input type="hidden" id="lms-tugas-id">
            <div>
                <label for="lms-tugas-judul" class="block mb-1 text-sm font-medium text-subtle">Judul Tugas</label>
                <input type="text" id="lms-tugas-judul" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>
            <div>
                <label for="lms-tugas-deskripsi" class="block mb-1 text-sm font-medium text-subtle">Petunjuk (Opsional)</label>
                <textarea id="lms-tugas-deskripsi" rows="5" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5"></textarea>
            </div>
            <div>
                <label for="lms-tugas-duedate" class="block mb-1 text-sm font-medium text-subtle">Batas Waktu Pengumpulan</label>
                <input type="datetime-local" id="lms-tugas-duedate" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>
            <div>
                <label for="lms-tugas-file" class="block mb-1 text-sm font-medium text-subtle">Lampirkan File (Opsional)</label>
                <input type="file" id="lms-tugas-file" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5">
                <p class="text-xs text-subtle mt-1">Ukuran file maksimal: 20MB.</p>
            </div>
            <div class="pt-4 flex justify-end space-x-4">
                <button type="button" class="btn-cancel-lms-tugas py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold">Batal</button>
                <button type="submit" class="py-2 px-4 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold">Simpan Tugas</button>
            </div>
        </form>
    </div>
</div>
