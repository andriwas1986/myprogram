<div id="pengguna-detail-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-lg">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 id="pengguna-detail-title" class="text-2xl font-bold text-main">Detail Pengguna</h3>
            <!-- 
              MODIFIKASI DI SINI:
              Menambahkan data-dismiss="modal" pada tombol 'X'
            -->
            <button type="button" data-dismiss="modal" class="btn-close-pengguna-detail text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
        </div>
        <div class="p-8 max-h-[80vh] overflow-y-auto">
            <div class="flex flex-col items-center">
                <img id="detail-pengguna-foto" src="https://placehold.co/150x150/e2e8f0/4a5568?text=Foto" alt="Foto Pengguna" class="w-32 h-32 object-cover rounded-full border-4 border-main mb-4">
                <h2 id="detail-pengguna-nama" class="text-2xl font-bold text-main"></h2>
                <p id="detail-pengguna-jabatan" class="text-subtle"></p>

                <div class="w-full border-t border-main pt-6 mt-6">
                    <table class="w-full text-left text-sm">
                        <tbody>
                            <tr class="border-b border-tertiary">
                                <td class="py-3 px-4 w-1/3 text-subtle font-medium">Username</td>
                                <td id="detail-pengguna-username" class="py-3 px-4 text-main font-semibold"></td>
                            </tr>
                            <tr class="">
                                <td class="py-3 px-4 text-subtle font-medium">NIP / NRP</td>
                                <td id="detail-pengguna-nip" class="py-3 px-4 text-main"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
