<div id="transkrip-edit-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-lg">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 class="text-2xl font-bold text-main">Edit Data Transkrip</h3>
            <button type="button" class="btn-cancel-transkrip-edit text-gray-400 hover:text-gray-600 text-3xl leading-none" data-dismiss="modal">&times;</button>
        </div>
        <form id="transkrip-edit-form" class="p-6 space-y-4">
            <input type="hidden" id="transkrip-edit-siswa-id">
            <div>
                <label class="block mb-1 text-sm font-medium text-subtle">Nama Siswa</label>
                <input type="text" id="transkrip-edit-nama" class="bg-tertiary border-main text-main text-sm rounded-lg block w-full p-2.5" readonly>
            </div>
            <div>
                <label for="transkrip-edit-ijazah" class="block mb-1 text-sm font-medium text-subtle">No. Ijazah</label>
                <input type="text" id="transkrip-edit-ijazah" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5">
            </div>
            <div>
                <label for="transkrip-edit-seri" class="block mb-1 text-sm font-medium text-subtle">No. Seri Transkrip</label>
                <input type="text" id="transkrip-edit-seri" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5">
            </div>
            <div class="pt-4 flex justify-end space-x-4">
              <button type="button" class="btn-cancel-transkrip-edit py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold" data-dismiss="modal">
                    Batal</button>
                <button type="submit" id="btn-save-transkrip-edit" class="py-2 px-4 rounded-lg bg-blue-600 text-white hover:bg-blue-700 font-semibold">
                    Simpan</button>
            </div>
        </form>
    </div>
</div>
