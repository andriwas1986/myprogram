<div id="lms-upload-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-lg">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 class="text-2xl font-bold text-main">Tambah Materi Baru</h3>
            <button type="button" class="btn-cancel-lms-upload text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
        </div>
        
        <form id="lms-upload-form" class="p-6 space-y-4">
            <div>
                <label for="lms-upload-judul" class="block mb-1 text-sm font-medium text-subtle">Judul Materi</label>
                <input type="text" id="lms-upload-judul" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>
            <div>
                <label for="lms-upload-deskripsi" class="block mb-1 text-sm font-medium text-subtle">Deskripsi (Opsional)</label>
                <textarea id="lms-upload-deskripsi" rows="3" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5"></textarea>
            </div>
            
            <div>
                <label for="lms-upload-link" class="block mb-1 text-sm font-medium text-subtle">Sematkan Link (Opsional)</label>
                <input type="url" id="lms-upload-link" placeholder="https://www.youtube.com/watch?v=..." class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5">
                <p class="text-xs text-subtle mt-1">Isi jika materi berupa video YouTube atau link Google Drive.</p>
            </div>

            <div class="text-center my-2">
                <span class="text-sm text-subtle">ATAU</span>
            </div>

            <div>
                <label for="lms-upload-file" class="block mb-1 text-sm font-medium text-subtle">Unggah File (Opsional)</label>
                <input type="file" id="lms-upload-file" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5">
                <p class="text-xs text-subtle mt-1">Isi jika materi berupa file dari komputer (maks. 20MB).</p>
            </div>

            <div class="pt-4 flex justify-end space-x-4">
                <button type="button" class="btn-cancel-lms-upload py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold">Batal</button>
                <button type="submit" class="py-2 px-4 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold">Simpan Materi</button>
            </div>
        </form>
    </div>
</div>
