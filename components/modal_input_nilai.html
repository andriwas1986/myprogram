<div id="input-nilai-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-4xl">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <div>
                <h3 class="text-2xl font-bold text-main">Input Nilai Akademik</h3>
                <p id="input-nilai-siswa-info" class="text-subtle text-sm"></p>
            </div>
            
            <button type="button" class="btn-cancel-input-nilai text-gray-400 hover:text-gray-600 text-3xl leading-none" data-dismiss="modal">&times;</button>
        
        </div>
        <form id="input-nilai-form">
            <input type="hidden" id="input-nilai-siswa-id">
            <div class="p-6 max-h-[60vh] overflow-y-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-subtle uppercase bg-tertiary">
                        <tr>
                            <th class="p-3">No</th>
                            <th class="p-3">Kode Mapel</th>
                            <th class="p-3">Nama Mata Pelajaran</th>
                            <th class="p-3 w-24">Nilai</th>
                        </tr>
                    </thead>
                    <tbody id="input-nilai-mapel-table-body">
                        </tbody>
                </table>
            </div>
            <div class="p-6 border-t border-main flex justify-end space-x-4">
                
                <button type="button" class="btn-cancel-input-nilai py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold" data-dismiss="modal">Batal</button>
                
                <button type="submit" class="py-2 px-4 rounded-lg bg-blue-600 text-white hover:bg-blue-700 font-semibold">Simpan Nilai</button>
            
            </div>
        </form>
    </div>
</div>
