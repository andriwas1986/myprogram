<div id="petikan-settings-modal" class="modal fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-md mx-4">
        <div class="p-5 border-b border-main flex justify-between items-center bg-gray-50 rounded-t-lg">
            <h3 class="text-lg font-bold text-main">Pengaturan SK / KEP</h3>
            <button type="button" class="text-gray-400 hover:text-gray-600 text-2xl" data-dismiss="modal">&times;</button>
        </div>
        <form id="petikan-settings-form" class="p-6 space-y-6">
            <div>
                <label class="block text-sm font-medium text-subtle mb-1">Nomor Keputusan (KEP)</label>
                <input type="text" id="set-no-kep" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" placeholder="Contoh: KEP/34/VIII/2025" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-subtle mb-1">Tanggal Keputusan</label>
                <input type="date" id="set-tgl-kep" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>

            <div class="bg-blue-50 border-l-4 border-blue-500 p-3 text-xs text-blue-700">
                <p class="font-bold">Info:</p>
                <p>Pengaturan Pejabat Penandatangan (Nama, Pangkat, Jabatan) kini dapat diatur melalui menu <b>Pengaturan (Settings)</b> utama.</p>
            </div>

            <div class="flex justify-end pt-4 space-x-2">
                <button type="button" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400" data-dismiss="modal">Batal</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Simpan SK</button>
            </div>
        </form>
    </div>
</div>
