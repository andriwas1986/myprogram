<div id="lms-forum-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-2xl">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 class="text-2xl font-bold text-main">Buat Topik Diskusi Baru</h3>
            <button type="button" class="btn-cancel-lms-forum text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
        </div>
        <form id="lms-forum-form" class="p-6 space-y-4">
            <div>
                <label for="lms-forum-judul" class="block mb-1 text-sm font-medium text-subtle">Judul Topik</label>
                <input type="text" id="lms-forum-judul" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>
            <div>
                <label for="lms-forum-isi" class="block mb-1 text-sm font-medium text-subtle">Isi Pesan</label>
                <textarea id="lms-forum-isi" rows="6" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required></textarea>
            </div>
            <div class="pt-4 flex justify-end">
                <button type="submit" class="py-2 px-5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold">Kirim Topik</button>
            </div>
        </form>
    </div>
</div>
