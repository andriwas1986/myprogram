<div id="absensi-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-lg">
        <div class="p-6 border-b border-main">
            <h3 class="text-2xl font-bold text-main">Konfirmasi Kehadiran</h3>
            <p id="absensi-modal-jadwal-info" class="text-subtle text-sm mt-1"></p>
        </div>
        <form id="absensi-form" class="p-6 space-y-4">
            <input type="hidden" id="absensi-jadwal-id">
            <input type="hidden" id="absensi-id"> <div>
                <label for="absensi-status" class="block mb-1 text-sm font-medium text-subtle">Status Kehadiran</label>
                <select id="absensi-status" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
                    <option value="Hadir">Hadir</option>
                    <option value="Sakit">Sakit</option>
                    <option value="Izin">Izin</option>
                </select>
            </div>
            <div>
                <label for="absensi-keterangan" class="block mb-1 text-sm font-medium text-subtle">Keterangan (Opsional)</label>
                <textarea id="absensi-keterangan" rows="3" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5"></textarea>
            </div>
            <div class="pt-4 flex justify-end space-x-4">
                <button type="button" data-dismiss="modal" class="btn-cancel-absensi py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold">Batal</button>
                <button type="submit" class="py-2 px-4 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold">Simpan</button>
            </div>
        </form>
    </div>
</div>
