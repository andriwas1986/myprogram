<div id="mapel-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-md">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 id="mapel-modal-title" class="text-2xl font-bold text-main">Tambah Mata Pelajaran</h3>
            
            <button type="button" class="btn-cancel-mapel text-gray-400 hover:text-gray-600 text-3xl leading-none" data-dismiss="modal">&times;</button>
        </div>
        <form id="mapel-form" class="p-6 space-y-4">
            <input type="hidden" id="mapel-id">
            <input type="hidden" id="mapel-kategori-pendidikan">
            <input type="hidden" id="mapel-detail-pendidikan">
            <input type="hidden" id="mapel-tahun-ajaran">
            <input type="hidden" id="mapel-jp" value="0">
            <input type="hidden" id="mapel-deskripsi" value="-">

            <div>
                <label for="mapel-kode" class="block mb-1 text-sm font-medium text-subtle">Kode Mapel</label>
                <input type="text" id="mapel-kode" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" placeholder="Contoh: K-01" required> 
            </div>
            <div>
                <label for="mapel-nama" class="block mb-1 text-sm font-medium text-subtle">Nama Mata Pelajaran</label>
                <input type="text" id="mapel-nama" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>
            <div>
                <label for="mapel-kategori" class="block mb-1 text-sm font-medium text-subtle">Kelompok Mapel</label>
                <select id="mapel-kategori" class="bg-input border border-main text-main text-sm rounded-lg block w-full p-2.5" required>
                    <option value="Utama">Utama</option>
                    <option value="Pendukung">Pendukung</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
            <div class="pt-4 flex justify-end space-x-4">
                
                <button type="button" class="btn-cancel-mapel py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold" data-dismiss="modal">
                    Batal
                </button>
                
                <button type="submit" id="btn-save-mapel" class="py-2 px-4 rounded-lg bg-blue-600 text-white hover:bg-blue-700 font-semibold">
                    Simpan
                </button>
            </div>
        </form>
    </div>
</div>
