<div id="jasmani-modal" class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden p-4 z-50">
    <div class="bg-card rounded-lg shadow-xl w-full max-w-md">
        <div class="p-6 border-b border-main flex justify-between items-center">
            <h3 class="text-2xl font-bold text-main">Input Nilai Jasmani</h3>
            
            <button type="button" class="btn-cancel-jasmani text-gray-400 hover:text-gray-600 text-3xl leading-none" data-dismiss="modal">&times;</button>
        </div>
        <form id="jasmani-form" class="p-6 space-y-4">
            <input type="hidden" id="jasmani-siswa-id">
            <div>
                <label class="block mb-1 text-sm font-medium text-subtle">Nama Siswa</label>
                <input type="text" id="jasmani-siswa-nama" class="bg-tertiary border-main text-main text-sm rounded-lg block w-full p-2.5" readonly>
            </div>
            <div>
                <label class="block mb-1 text-sm font-medium text-subtle">Kategori</label>
                <input type="text" id="jasmani-siswa-kategori" class="bg-tertiary border-main text-main text-sm rounded-lg block w-full p-2.5" readonly>
            </div>
            <div>
                <label for="jasmani-nilai" class="block mb-1 text-sm font-medium text-subtle">Masukkan Nilai (0-100)</label>
                <input type="number" id="jasmani-nilai" min="0" max="100" class="bg-input border-main text-main text-sm rounded-lg block w-full p-2.5" required>
            </div>
            <div class="pt-4 flex justify-end space-x-4">
                
                <button type="button" class="btn-cancel-jasmani py-2 px-4 rounded-lg bg-gray-300 text-gray-800 hover:bg-gray-400 font-semibold" data-dismiss="modal">Batal</button>
                
                <button type="submit" id="btn-save-jasmani" class="py-2 px-4 rounded-lg bg-blue-600 text-white hover:bg-blue-700 font-semibold">Simpan Nilai</button>
            </div>
        </form>
    </div>
</div>
