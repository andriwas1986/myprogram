<div class="bg-card p-6 rounded-lg shadow-md">
    <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
        <h2 class="text-2xl font-bold text-main">Manajemen Data Gadik</h2>
        <div class="flex items-center gap-2">
            <input type="text" id="search-gadik-input" placeholder="Cari nama atau NRP..." class="bg-input border-main text-main text-sm rounded-lg p-2.5 w-48">
            <button id="btn-tambah-gadik" data-permission-action="create_data_gadik" class="bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 whitespace-nowrap">
                <i class="fas fa-plus mr-2"></i>Tambah Gadik
            </button>
        </div>
    </div>
    <div class="flex flex-wrap items-center gap-4 mb-4 p-4 bg-tertiary rounded-lg">
        <select id="filter-gadik-tahun" class="bg-input border-main text-main text-sm rounded-lg p-2 w-auto"></select>
        <select id="filter-gadik-kategori" class="bg-input border-main text-main text-sm rounded-lg p-2 w-auto"></select>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
            <thead class="text-xs text-subtle uppercase bg-tertiary">
                <tr>
                    <th class="p-3">No</th>
                    <th class="p-3">Nama Lengkap</th>
                    <th class="p-3">NRP</th>
                    <th class="p-3">Pangkat</th>
                    <th class="p-3">Jabatan</th>
                    <th class="p-3 text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="gadik-table-body">
                </tbody>
        </table>
    </div>
	<div id="gadik-pagination" class="flex justify-between items-center mt-4 no-print">
        </div>
    </div>
</div>
