<div class="bg-card p-4 sm:p-6 rounded-xl shadow-lg transition-transform transform hover:scale-101 duration-300">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-main mb-1">Manajemen Kartu Siswa</h2>
            <p class="text-sm text-subtle">Cetak dan kelola kartu tanda siswa.</p>
        </div>
        <div class="flex items-center space-x-2 mt-4 sm:mt-0">
            <button id="print-all-kts-btn" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition duration-200 text-sm flex items-center">
                <i class="fas fa-print mr-2"></i>Cetak Semua
            </button>
            <button id="print-selected-kts-btn" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition duration-200 text-sm flex items-center">
                <i class="fas fa-print mr-2"></i>Cetak Terpilih
            </button>
        </div>
    </div>

    <div class="border-b border-gray-200 dark:border-gray-700 mb-6">
        <nav class="flex space-x-4" aria-label="Tabs">
            <button id="tab-kartu" class="tab-btn hs-tab-active:font-semibold hs-tab-active:border-blue-600 hs-tab-active:text-blue-600 py-4 px-1 inline-flex items-center gap-x-2 border-b-2 border-transparent text-sm whitespace-nowrap text-gray-500 hover:text-blue-600 focus:outline-none focus:text-blue-600 disabled:opacity-50 disabled:pointer-events-none dark:text-gray-400 dark:hover:text-blue-500 active"
                    data-tab="tampilan">
                Tampilan Kartu
            </button>
            <button id="tab-pengaturan" class="tab-btn hs-tab-active:font-semibold hs-tab-active:border-blue-600 hs-tab-active:text-blue-600 py-4 px-1 inline-flex items-center gap-x-2 border-b-2 border-transparent text-sm whitespace-nowrap text-gray-500 hover:text-blue-600 focus:outline-none focus:text-blue-600 disabled:opacity-50 disabled:pointer-events-none dark:text-gray-400 dark:hover:text-blue-500"
                    data-tab="pengaturan">
                Pengaturan Cetak
            </button>
        </nav>
    </div>

    <div id="tab-content">
        <div id="tab-content-tampilan">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 space-y-4 md:space-y-0">
                <div class="w-full md:w-1/3">
                    <input type="text" id="search-kartu-siswa" placeholder="Cari nama atau nosis..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                </div>
                <div class="w-full md:w-auto flex items-center space-x-2">
                     <label for="select-all-kts" class="flex items-center text-sm text-subtle">
                        <input type="checkbox" id="select-all-kts" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 mr-2">
                        Pilih Semua
                    </label>
                    <select id="filter-pendidikan-kartu"
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="all">Semua Pendidikan</option>
                    </select>
                </div>
            </div>

            <div id="kartu-siswa-grid" class="flex flex-wrap justify-center gap-6">
                </div>

            <div id="kartu-siswa-pagination" class="mt-8 flex justify-center items-center space-x-2 no-print">
                </div>
        </div>

        <div id="tab-content-pengaturan" class="hidden">
             <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="p-4 bg-tertiary rounded-lg">
                        <h3 class="text-base font-semibold text-main mb-2 border-b border-main pb-2">Pengaturan Foto</h3>
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div><label for="kts-foto-width" class="block mb-1 text-sm font-medium text-subtle">Lebar (px)</label><input type="number" id="kts-foto-width" class="setting-input bg-input border-main text-main text-sm rounded-lg block w-full p-2"></div>
                            <div><label for="kts-foto-height" class="block mb-1 text-sm font-medium text-subtle">Tinggi (px)</label><input type="number" id="kts-foto-height" class="setting-input bg-input border-main text-main text-sm rounded-lg block w-full p-2"></div>
                            <div><label for="kts-foto-top" class="block mb-1 text-sm font-medium text-subtle">Posisi Atas (px)</label><input type="number" id="kts-foto-top" class="setting-input bg-input border-main text-main text-sm rounded-lg block w-full p-2"></div>
                            <div><label for="kts-foto-right" class="block mb-1 text-sm font-medium text-subtle">Posisi Kanan (px)</label><input type="number" id="kts-foto-right" class="setting-input bg-input border-main text-main text-sm rounded-lg block w-full p-2"></div>
                        </div>
                    </div>
                    <div class="p-4 bg-tertiary rounded-lg">
                        <h3 class="text-base font-semibold text-main mb-2 border-b border-main pb-2">Pengaturan Teks Global</h3>
                         <div class="grid grid-cols-2 gap-4 pt-2">
                            <div>
                                <label for="kts-font-family" class="block mb-1 text-sm font-medium text-subtle">Jenis Font</label>
                                <select id="kts-font-family" class="setting-input bg-input border-main text-main text-sm rounded-lg block w-full p-2.5">
                                    <option>Arial, sans-serif</option>
                                    <option>'Roboto', sans-serif</option>
                                    <option>'Roboto Bold', sans-serif</option>
                                    <option>Verdana, sans-serif</option>
                                    <option>Tahoma, sans-serif</option>
                                    <option>'Courier New', Courier, monospace</option>
                                    <option>'Times New Roman', Times, serif</option>
                                </select>
                            </div>
                            <div>
                                <label for="kts-font-color" class="block mb-1 text-sm font-medium text-subtle">Warna Font</label>
                                <input type="color" id="kts-font-color" class="setting-input bg-input border-main w-full h-10 p-1 rounded-lg">
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-tertiary rounded-lg">
                        <h3 class="text-base font-semibold text-main mb-2 border-b border-main pb-2">Pengaturan Posisi & Ukuran Teks</h3>
                        <div class="space-y-3 pt-2">
                            <div class="grid grid-cols-4 gap-2 items-center">
                                <label class="text-sm font-medium text-subtle">Nama</label>
                                <input type="number" id="kts-nama-top" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Atas">
                                <input type="number" id="kts-nama-left" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Kiri">
                                <input type="number" id="kts-font-size-nama" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Ukuran">
                            </div>
                            <div class="grid grid-cols-4 gap-2 items-center">
                                <label class="text-sm font-medium text-subtle">Nosis</label>
                                <input type="number" id="kts-nosis-top" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Atas">
                                <input type="number" id="kts-nosis-left" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Kiri">
                                <input type="number" id="kts-font-size-nosis" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Ukuran">
                            </div>
                            <div class="grid grid-cols-4 gap-2 items-center">
                                <label class="text-sm font-medium text-subtle">Didik</label>
                                <input type="number" id="kts-pendidikan-top" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Atas">
                                <input type="number" id="kts-pendidikan-left" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Kiri">
                                <input type="number" id="kts-font-size-pendidikan" class="setting-input bg-input border-main text-main text-sm rounded p-2" placeholder="Ukuran">
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end">
                        <button id="save-settings-kts-btn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition duration-200">Simpan Pengaturan</button>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-main mb-2">Pratinjau Langsung</h3>
                    <div id="kts-preview-container">
                        </div>
                </div>
            </div>
        </div>
    </div>
    </div>
